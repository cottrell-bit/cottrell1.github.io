<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cottrell.info</title>
    <meta name="description" content="cottrell.info — Cottrell family members only" />
    <style>
      :root {
        /* Crest-inspired palette: black / white / red */
        --bg: #070707;
        --bg2: #0f0f10;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.16);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.70);
        --red: #d61f2a;
        --red2: #ff3a3a;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.68);
        --radius: 18px;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background:
          radial-gradient(1100px 700px at 20% 12%, rgba(214, 31, 42, 0.22), transparent 60%),
          radial-gradient(900px 650px at 85% 28%, rgba(255, 58, 58, 0.12), transparent 60%),
          radial-gradient(900px 900px at 50% 120%, rgba(255, 255, 255, 0.06), transparent 60%),
          linear-gradient(180deg, var(--bg), var(--bg2));
        display: grid;
        place-items: center;
        padding: 28px;
        transition: opacity 0.6s ease, filter 0.6s ease;
      }

      body.fade-out {
        opacity: 0;
        filter: blur(6px);
      }

      .card {
        width: min(520px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        overflow: hidden;
        position: relative;
        isolation: isolate;
        transition: transform 0.5s ease, opacity 0.5s ease;
      }

      body.fade-out .card {
        transform: scale(0.96);
        opacity: 0;
      }

      /* Stylized coat-of-arms watermark */
      .card::before {
        content: "";
        position: absolute;
        inset: -60px;
        opacity: 0.20;
        filter: blur(0.8px);
        transform: rotate(-10deg) scale(1.02);
        z-index: -1;
        background:
          radial-gradient(260px 220px at 30% 30%, rgba(214, 31, 42, 0.35), transparent 65%),
          radial-gradient(240px 200px at 70% 38%, rgba(255, 58, 58, 0.22), transparent 68%),
          linear-gradient(135deg,
            transparent 0%,
            transparent 34%,
            rgba(255, 255, 255, 0.28) 34%,
            rgba(255, 255, 255, 0.28) 48%,
            transparent 48%,
            transparent 100%),
          linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.10)),
          repeating-radial-gradient(circle at 20% 65%, rgba(0,0,0,0.28) 0 5px, transparent 5px 15px),
          repeating-radial-gradient(circle at 45% 70%, rgba(0,0,0,0.22) 0 5px, transparent 5px 15px),
          repeating-radial-gradient(circle at 70% 75%, rgba(0,0,0,0.24) 0 5px, transparent 5px 15px);
        clip-path: polygon(50% 0%,84% 10%,92% 34%,86% 58%,70% 82%,50% 100%,30% 82%,14% 58%,8% 34%,16% 10%);
      }

      .card::after {
        content: "";
        position: absolute;
        inset: 24px;
        border-radius: calc(var(--radius) - 8px);
        border: 1px solid rgba(255, 255, 255, 0.10);
        pointer-events: none;
        z-index: 0;
      }

      .content { position: relative; z-index: 1; padding: 26px 24px 24px; }
      .snippet { text-align: center; color: var(--muted); font-size: 13px; margin: 0 0 14px; }
      h1 { margin: 0 0 16px; font-size: 22px; text-align: center; }
      form { display: grid; gap: 12px; }
      label { display: grid; gap: 6px; font-size: 13px; }
      input { padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.16); background: rgba(0,0,0,0.22); color: var(--text); }
      button { border: 0; border-radius: 12px; padding: 12px; font-weight: 700; background: linear-gradient(135deg, var(--red), var(--red2)); cursor: pointer; }
      .hint { margin-top: 10px; font-size: 12px; text-align: center; color: rgba(255,255,255,0.6); }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-label="Cottrell login">
      <!-- LOGIN VIEW -->
      <div id="loginView" class="content">
        <p class="snippet">This page is only accessible for Cottrell Family Members.</p>
        <h1>Member Login</h1>

        <form id="loginForm" autocomplete="off" novalidate>
          <label>
            Username
            <input id="username" name="username" type="text" placeholder="Username" required />
          </label>

          <label>
            Password
            <input id="password" name="password" type="password" placeholder="Password" required />
          </label>

          <button type="submit">Sign in</button>

          <div class="hint">Mock login — this form does not go anywhere.</div>
        </form>
      </div>

      <!-- WOMp VIEW (same page to avoid preview/navigation blocks) -->
      <div id="wompView" class="content" style="display:none;">
        <p class="snippet">Access denied.</p>
        <h1 style="margin-bottom: 6px;">better luck next time</h1>
        <div style="text-align:center; font-size: 26px; font-weight: 900; letter-spacing: -0.6px; margin-top: 4px;">womp womp</div>
        <div class="hint" style="margin-top: 16px;">(This is a single-page redirect for preview compatibility.)</div>
      </div>
    </main>

    <script>
      // Some previews / hosts block cross-page navigation (file:// or sandbox).
      // So we simulate the redirect on the same page.
      const form = document.getElementById('loginForm');
      const loginView = document.getElementById('loginView');
      const wompView = document.getElementById('wompView');

      form.addEventListener('submit', (e) => {
        e.preventDefault();

        // Transition out
        document.body.classList.add('fade-out');

        // Swap view at the end of the fade
        setTimeout(() => {
          loginView.style.display = 'none';
          wompView.style.display = 'block';

          // Update URL without navigating (optional)
          try { history.pushState({}, '', '#womp'); } catch (_) {}

          // Transition back in
          document.body.classList.remove('fade-out');
        }, 600);
      });

      // If someone lands directly on #womp, show womp view
      if (window.location.hash === '#womp') {
        loginView.style.display = 'none';
        wompView.style.display = 'block';
      }
    </script>
  </body>
</html>
